<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" shape-rendering="crispEdges">
  <!-- Blade tip -->
  <rect x="7" y="0" width="2" height="1" fill="#f0f4f8"/>
  <!-- Blade upper -->
  <rect x="7" y="1" width="2" height="6" fill="#c8dce8"/>
  <!-- Blade lower (slightly darker) -->
  <rect x="7" y="7" width="2" height="2" fill="#a0b8cc"/>
  <!-- Crossguard -->
  <rect x="3" y="9" width="10" height="2" fill="#5a7a9a"/>
  <!-- Crossguard highlight -->
  <rect x="3" y="9" width="10" height="1" fill="#7a9aba"/>
  <!-- Handle -->
  <rect x="7" y="11" width="2" height="3" fill="#7a4a2a"/>
  <!-- Handle wrap -->
  <rect x="7" y="12" width="2" height="1" fill="#9a6a4a"/>
  <!-- Pommel -->
  <rect x="6" y="14" width="4" height="2" fill="#5a7a9a"/>
  <!-- Pommel highlight -->
  <rect x="6" y="14" width="4" height="1" fill="#7a9aba"/>
</svg>
