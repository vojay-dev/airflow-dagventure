<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" shape-rendering="crispEdges">
  <!-- Dark background -->
  <rect width="32" height="32" rx="6" fill="#0d0d18"/>

  <!-- Blade tip (narrow point) -->
  <rect x="15" y="2" width="2" height="2" fill="#e8eef8"/>

  <!-- Blade body -->
  <rect x="14" y="4" width="4" height="10" fill="#c0ccd8"/>
  <!-- Highlight (left edge of blade) -->
  <rect x="14" y="4" width="1" height="10" fill="#e4ecf8"/>
  <!-- Shadow (right edge of blade) -->
  <rect x="17" y="4" width="1" height="10" fill="#8898a8"/>

  <!-- Crossguard -->
  <rect x="7"  y="14" width="18" height="3" fill="#ffe066"/>
  <!-- Crossguard bottom shadow -->
  <rect x="7"  y="16" width="18" height="1" fill="#cc9900"/>

  <!-- Handle / grip -->
  <rect x="14" y="17" width="4" height="7" fill="#7a3010"/>
  <!-- Grip wrapping detail -->
  <rect x="14" y="19" width="4" height="1" fill="#501c08"/>
  <rect x="14" y="21" width="4" height="1" fill="#501c08"/>

  <!-- Pommel -->
  <rect x="12" y="24" width="8" height="5" fill="#ffe066"/>
  <rect x="12" y="24" width="8" height="1" fill="#ffdd33"/>
  <rect x="12" y="28" width="8" height="1" fill="#cc9900"/>
</svg>
